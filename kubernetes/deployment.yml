apiVersion: apps/v1
kind: Deployment
metadata:
  name: zyncjobs-ai
  labels:
    app: zyncjobs-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zyncjobs-ai
  template:
    metadata:
      labels:
        app: zyncjobs-ai
    spec:
      containers:
        - name: ai-service
          image: zyncjobs-ai:latest
          ports:
            - containerPort: 8001
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama-service:11434"
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: POSTGRES_HOST
              value: "postgres-service"
            - name: QDRANT_HOST
              value: "qdrant-service"
            - name: USE_SQLITE
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: zyncjobs-ai-service
spec:
  selector:
    app: zyncjobs-ai
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
