# ZyncJobs Unified API Gateway — api.zyncjobs.com
# Routes: /ai/* → AI Service (port 8001)
#         /api/* → Node Backend (port 5000)
#         /auth/* → Node Backend
#         /ws/*   → Node Backend (WebSocket)
#         /uploads/* → Node Backend

upstream ai_service {
    server 127.0.0.1:8001;
    keepalive 32;
}

upstream node_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.zyncjobs.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.zyncjobs.com;

    ssl_certificate     /etc/letsencrypt/live/api.zyncjobs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.zyncjobs.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;
    keepalive_timeout    300;

    # ── CORS (merged from nginx-api.conf) ──────────────────────────
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin      $http_origin always;
        add_header Access-Control-Allow-Credentials true       always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;
        add_header Access-Control-Max-Age           86400 always;
        add_header Content-Length 0;
        return 204;
    }

    # ── AI Service (port 8001) ──────────────────────────────────────
    location /ai/ {
        proxy_pass http://ai_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /health {
        proxy_pass http://ai_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /metrics {
        proxy_pass http://ai_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    location /version {
        proxy_pass http://ai_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Node Backend (port 5000) ────────────────────────────────────
    location /api/ {
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
    }

    location /auth/ {
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── WebSocket ───────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://node_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # ── CORS on all responses ───────────────────────────────────────
    add_header Access-Control-Allow-Origin      $http_origin always;
    add_header Access-Control-Allow-Credentials true       always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Authorization, Content-Type, X-Requested-With, Accept, Origin" always;

    # ── Security headers ────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Logging ─────────────────────────────────────────────────────
    access_log /var/log/nginx/ai-service-access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/ai-service-error.log warn;

    # ── Rate limiting ───────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=ai_api:10m rate=30r/s;
    limit_req zone=ai_api burst=50 nodelay;
}
