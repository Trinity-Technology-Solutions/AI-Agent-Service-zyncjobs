name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zyncjobs
          POSTGRES_PASSWORD: zyncjobs_pass
          POSTGRES_DB: zyncjobs_ai
        ports:
          - 5432:5432
    env:
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://localhost:11434
      REDIS_HOST: localhost
      POSTGRES_HOST: localhost
      POSTGRES_USER: zyncjobs
      POSTGRES_PASSWORD: zyncjobs_pass
      POSTGRES_DB: zyncjobs_ai
      ENVIRONMENT: test
      LOG_LEVEL: WARNING
      BACKEND_API_URL: http://localhost:5000
      BACKEND_TIMEOUT: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r recruitment_ai/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          python -m pytest recruitment_ai/tests/ -v --tb=line \
            -W ignore::DeprecationWarning \
            -W ignore::UserWarning \
            --junitxml=test-results.xml
          echo "::notice::All tests completed"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Check formatting with black
        continue-on-error: true
        run: black --check recruitment_ai/ --diff

      - name: Lint with flake8
        continue-on-error: true
        run: flake8 recruitment_ai/ --max-line-length=120 --ignore=E203,W503

  docker:
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: zyncjobs/ai-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
